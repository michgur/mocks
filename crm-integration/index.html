<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Harmony — CRM integration</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;
  --panel:#fff;
  --border:#e5e7eb;
  --border-soft:#f1f3f5;
  --text:#18181b;
  --text-2:#52525b;
  --text-3:#9ca3af;
  --accent:#16a34a;
  --accent-bg:#dcfce7;
  --accent-text:#15803d;
  --primary:#111827;
  --warn-bg:#fffbeb;
  --warn-bd:#fde68a;
  --warn-tx:#92400e;
  --err-bg:#fef2f2;
  --err-bd:#fecaca;
  --err-tx:#b91c1c;
  --hubspot:#ff7a59;
  --salesforce:#1798c1;
  --pipedrive:#1d6f47;
}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}

.app{display:grid;grid-template-columns:56px 240px 1fr;height:100vh;overflow:hidden}

/* Icon rail */
.rail{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px}
.rail-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#0f172a,#334155);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;margin-bottom:8px}
.rail-item{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);cursor:pointer;font-size:15px}
.rail-item:hover{background:var(--bg);color:var(--text)}
.rail-item.on{background:var(--accent-bg);color:var(--accent-text)}
.rail-spacer{flex:1}
.rail-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#fda4af,#f472b6);margin-bottom:6px}

/* Section sidebar */
.sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:14px 10px}
.sb-section{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;padding:14px 10px 6px}
.sb-section:first-child{padding-top:4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;cursor:pointer;color:var(--text-2);font-size:13px;font-weight:500}
.sb-item:hover{background:var(--bg);color:var(--text)}
.sb-item.on{background:var(--accent-bg);color:var(--accent-text);font-weight:600}
.sb-item .ico{width:16px;display:inline-flex;justify-content:center;font-size:13px;color:inherit}
.sb-item .ico-sq{width:16px;height:16px;border-radius:4px;color:#fff;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-item .sb-mini{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* Main */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;min-height:58px}
.crumb{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--text);min-width:0}
.crumb .back{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-2);cursor:pointer}
.crumb .back:hover{background:var(--bg);color:var(--text)}
.crumb-sep{color:var(--text-3);font-weight:400}
.crumb-light{color:var(--text-2);font-weight:500;cursor:pointer}
.crumb-light:hover{color:var(--text)}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:inherit;background:none;color:inherit;line-height:1.2;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover:not(:disabled){background:#000}
.btn-accent{background:var(--accent-bg);color:var(--accent-text)}
.btn-accent:hover{background:#bbf7d0}
.btn-outline{background:#fff;border-color:var(--border);color:var(--text)}
.btn-outline:hover:not(:disabled){border-color:#cbd5e1;background:#fafafa}
.btn-ghost{color:var(--text-2)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-danger-ghost{color:var(--err-tx)}
.btn-danger-ghost:hover{background:var(--err-bg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-lg{padding:10px 18px;font-size:14px}

/* Content area */
.content{flex:1;overflow-y:auto;padding:28px 32px 60px}
.content-narrow{max-width:960px;margin:0 auto}
.page-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.01em}
.page-sub{font-size:13px;color:var(--text-2);margin-bottom:24px;max-width:680px;line-height:1.55}

/* Cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:16px}
.card-pad{padding:18px 20px}
.card-hd{padding:14px 20px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-hd-title{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.card-hd-sub{font-size:12px;color:var(--text-2);margin-top:2px;font-weight:400}
.card-ft{padding:12px 20px;border-top:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fcfcfd;border-radius:0 0 10px 10px}

/* Integration list */
.int-row{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background .1s}
.int-row:last-child{border-bottom:none}
.int-row:hover{background:#fafafa}
.int-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0}
.int-name{font-size:14px;font-weight:600;color:var(--text)}
.int-desc{font-size:12px;color:var(--text-2);margin-top:2px;max-width:480px;line-height:1.45}
.int-right{margin-left:auto;display:flex;align-items:center;gap:10px}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;line-height:1.4}
.pill-mute{background:#f3f4f6;color:var(--text-2)}
.pill-ok{background:var(--accent-bg);color:var(--accent-text)}
.pill-warn{background:var(--warn-bg);color:var(--warn-tx);border:1px solid var(--warn-bd)}
.pill-err{background:var(--err-bg);color:var(--err-tx);border:1px solid var(--err-bd)}
.pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* Integration header */
.int-hdr{display:flex;align-items:center;gap:14px;padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid var(--border)}
.int-hdr-ico{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:19px;flex-shrink:0}
.int-hdr-title{font-size:20px;font-weight:700;letter-spacing:-.01em}
.int-hdr-meta{font-size:12px;color:var(--text-2);margin-top:4px;display:flex;align-items:center;gap:8px}
.int-hdr-actions{margin-left:auto;display:flex;gap:8px;align-items:center}

/* What-this-does list */
.what{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border-soft)}
.what:last-child{border-bottom:none}
.what-ico{width:28px;height:28px;border-radius:7px;background:var(--bg);color:var(--text-2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.what-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.what-sub{font-size:12px;color:var(--text-2);line-height:1.5}
code.k{background:#f3f4f6;color:var(--text);padding:1px 6px;border-radius:4px;font-family:"SF Mono",ui-monospace,monospace;font-size:11.5px;border:1px solid var(--border-soft)}

/* Banners */
.banner{display:flex;gap:12px;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;line-height:1.5;align-items:flex-start;border:1px solid}
.banner-ok{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.banner-warn{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn-tx)}
.banner-err{background:var(--err-bg);border-color:var(--err-bd);color:var(--err-tx)}
.banner .b-ico{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0;margin-top:1px;background:rgba(0,0,0,.05)}
.banner strong{font-weight:700}
.banner a{color:inherit;text-decoration:underline;cursor:pointer;font-weight:600}

/* Mapping table */
.maptbl{width:100%;border-collapse:collapse;font-size:13px}
.maptbl th{text-align:left;font-size:11px;font-weight:600;color:var(--text-3);padding:10px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em;background:#fcfcfd}
.maptbl td{padding:12px 14px;border-bottom:1px solid var(--border-soft);vertical-align:middle}
.maptbl tr:last-child td{border-bottom:none}
.maptbl tr.sec-row td{padding:14px 14px 6px;border-bottom:none;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;background:#fcfcfd}
.maptbl tr.sec-row .sec-note{text-transform:none;letter-spacing:0;color:var(--text-3);font-weight:400;margin-left:6px}
.attr-name{font-weight:600;color:var(--text);font-size:13px}
.attr-meta{font-size:11px;color:var(--text-3);font-family:"SF Mono",ui-monospace,monospace;margin-top:2px}
.req-pill{display:inline-block;background:#eff6ff;color:#1e40af;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;letter-spacing:.04em;margin-left:6px;vertical-align:middle}
.opt-pill{display:inline-block;background:#f3f4f6;color:var(--text-2);font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;letter-spacing:.04em;margin-left:6px;vertical-align:middle}
.col-ico{width:18px;height:18px;border-radius:4px;color:#fff;font-weight:800;font-size:10px;display:inline-flex;align-items:center;justify-content:center;margin-right:6px;vertical-align:middle}

/* Field select / source picker */
.src{display:inline-flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;background:#fff;cursor:pointer;min-width:180px;color:var(--text);user-select:none}
.src:hover{border-color:#9ca3af}
.src .mono{font-family:"SF Mono",ui-monospace,monospace;font-size:12px;color:var(--text)}
.src .arrow{color:var(--text-3);font-size:10px}
.src.auto{background:#f0fdf4;border-color:#bbf7d0}
.src.unmapped{background:#fef2f2;border-color:#fecaca;color:var(--err-tx);font-weight:600}
.src.warn{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn-tx)}

.used-pill{display:inline-block;background:#f3f4f6;border:1px solid var(--border);color:var(--text-2);font-size:11px;padding:2px 7px;border-radius:99px;margin-right:4px;margin-bottom:2px;font-weight:500}

/* Source pill on contacts table */
.src-tag{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text)}
.src-tag-ico{width:16px;height:16px;border-radius:4px;color:#fff;font-weight:800;font-size:9px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}

/* Add-contacts menu items */
.add-menu-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;cursor:pointer}
.add-menu-item:hover{background:var(--bg)}
.add-menu-item.disabled{opacity:.5;cursor:not-allowed}
.add-menu-item.disabled:hover{background:transparent}
.add-menu-item .ico-sq{width:22px;height:22px;border-radius:5px;color:#fff;font-weight:800;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.add-menu-item .ami-name{font-size:13px;font-weight:600;color:var(--text)}
.add-menu-item .ami-sub{font-size:11px;color:var(--text-3);margin-top:1px}

/* Empty state */
.empty{padding:36px 20px;text-align:center;border:1px dashed var(--border);border-radius:10px;background:#fcfcfd}
.empty-ico{width:42px;height:42px;border-radius:10px;background:#fff;border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-3);margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;margin-bottom:4px}
.empty-body{font-size:13px;color:var(--text-2);max-width:380px;margin:0 auto 16px;line-height:1.55}

/* Requirements panel */
.req-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 12px}
.req-pill-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid var(--border);border-radius:8px}
.req-pill-row .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#3b82f6}
.req-pill-row.optional .dot{background:#cbd5e1}
.req-pill-row .var{font-family:"SF Mono",ui-monospace,monospace;font-size:12px;color:var(--text);font-weight:600;flex:1;min-width:0}
.req-pill-row .stat{font-size:11px;font-weight:600}
.req-pill-row .stat.ok{color:var(--accent-text)}
.req-pill-row .stat.warn{color:var(--warn-tx)}
.req-pill-row .stat.miss{color:var(--err-tx)}

/* Source rows (active sources list) */
.src-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:#fff}
.src-row:last-child{margin-bottom:0}
.src-row-ico{width:34px;height:34px;border-radius:7px;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.src-row-name{font-size:13px;font-weight:600}
.src-row-meta{font-size:12px;color:var(--text-2);margin-top:2px;display:flex;align-items:center;gap:6px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;flex-shrink:0}
.live-dot.await{background:#f59e0b;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.src-row-right{margin-left:auto;text-align:right;font-size:12px;color:var(--text-2)}
.src-row-right .cnt{color:var(--text);font-weight:600;margin-top:2px}

/* Switches / toggles */
.switch{position:relative;width:34px;height:20px;background:#d4d4d8;border-radius:99px;cursor:pointer;flex-shrink:0;transition:background .15s}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.switch.on{background:var(--accent)}
.switch.on::after{left:16px}

.tog-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-soft)}
.tog-row:last-child{border-bottom:none}
.tog-row .grow{flex:1;min-width:0}
.tog-title{font-size:13px;font-weight:600}
.tog-sub{font-size:12px;color:var(--text-2);margin-top:2px;line-height:1.45}

/* Checklist (workflow setup) */
.chk-row{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border-soft)}
.chk-row:last-child{border-bottom:none}
.chk-bullet{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px}
.chk-bullet.done{background:var(--accent-bg);color:var(--accent-text)}
.chk-bullet.todo{background:#f3f4f6;color:var(--text-2);border:1px solid var(--border)}
.chk-title{font-size:13px;font-weight:600;margin-bottom:3px}
.chk-body{font-size:12px;color:var(--text-2);line-height:1.5}
.chk-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

/* Agent tabs */
.agent-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.agent-name{font-size:20px;font-weight:700;letter-spacing:-.01em}
.agent-meta{font-size:12px;color:var(--text-2);margin-top:4px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:22px}
.tab{padding:9px 14px;font-size:13px;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
.tab:hover{color:var(--text)}
.tab.on{color:var(--text);border-bottom-color:var(--primary);font-weight:600}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(2px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:12px;width:480px;max-width:92vw;max-height:90vh;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.25);animation:pop .15s ease}
@keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.modal-hd{padding:6px 14px;background:#f8fafc;border-bottom:1px solid var(--border);font-size:11px;color:var(--text-2);display:flex;align-items:center;gap:6px}
.modal-bd{padding:24px 28px}
.modal-ft{padding:14px 28px;background:#f8fafc;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.oauth-logos{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.oauth-logo{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}
.oauth-logo.h{background:linear-gradient(135deg,#0f172a,#334155)}
.oauth-arrow{color:var(--text-3);font-size:18px}
.oauth-title{font-size:17px;font-weight:700;margin-bottom:6px;letter-spacing:-.01em}
.oauth-sub{font-size:13px;color:var(--text-2);line-height:1.55;margin-bottom:16px}
.oauth-acct{background:#f8fafc;border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:12.5px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.oauth-scopes-h{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.oauth-scope{display:flex;gap:9px;font-size:13px;padding:6px 0;align-items:flex-start;line-height:1.5}
.oauth-scope .ck{color:var(--accent);font-weight:800;flex-shrink:0;margin-top:1px}

/* Source picker dropdown */
.po-backdrop{position:fixed;inset:0;z-index:70;background:transparent}
.popover{position:fixed;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.12);width:300px;padding:6px;z-index:80;animation:pop .12s ease;max-height:340px;overflow-y:auto}
.popover-h{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;padding:8px 10px 4px}
.po-search{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border-soft);margin-bottom:4px}
.po-search input{flex:1;border:none;outline:none;font-size:13px;font-family:inherit;background:transparent}
.po-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;cursor:pointer}
.po-item:hover{background:var(--bg)}
.po-item .mono{font-family:"SF Mono",ui-monospace,monospace;font-size:12.5px;color:var(--text)}
.po-item .pmeta{font-size:11px;color:var(--text-3)}

/* Toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{background:var(--primary);color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 6px 20px rgba(0,0,0,.18);animation:slide .2s ease;display:flex;align-items:center;gap:8px}
@keyframes slide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toast .ck{color:#34d399;font-weight:800}

.muted{color:var(--text-2)}
.mono{font-family:"SF Mono",ui-monospace,monospace}

/* Section header (lighter than card-hd) */
.sec{margin-bottom:28px}
.sec:last-child{margin-bottom:0}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}
.sec-h-title{font-size:13px;font-weight:600;color:var(--text)}
.sec-h-meta{font-size:12px;color:var(--text-3)}
.bullet-list{list-style:none;padding:0}
.bullet-list li{display:flex;gap:10px;padding:8px 0;font-size:13px;color:var(--text-2);line-height:1.55;border-bottom:1px solid var(--border-soft)}
.bullet-list li:last-child{border-bottom:none}
.bullet-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--text-3);margin-top:9px;flex-shrink:0}
.bullet-list li strong{color:var(--text);font-weight:600}
.empty-inline{display:flex;align-items:center;gap:14px;padding:18px 20px;border:1px dashed var(--border);border-radius:10px;background:#fcfcfd}
.empty-inline > div:first-child{flex:1}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#d1d5db}
</style>
</head>
<body>

<div class="app">
  <div class="rail">
    <div class="rail-logo">H</div>
    <div class="rail-item" title="Home">⌂</div>
    <div class="rail-item" title="Agents">✦</div>
    <div class="rail-item" id="rail-contacts" title="Contacts" onclick="goContacts()">☰</div>
    <div class="rail-item" title="Phone">☎</div>
    <div class="rail-item" id="rail-settings" title="Settings" onclick="goIntegrations()">⚙</div>
    <div class="rail-spacer"></div>
    <div class="rail-avatar"></div>
  </div>

  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="topbar" id="topbar"></div>
    <div class="content"><div class="content-narrow" id="view"></div></div>
  </div>
</div>

<div id="modal-root"></div>
<div id="popover-root"></div>
<div class="toast-wrap" id="toasts"></div>

<script>
/* ============================================================
   STATE
============================================================ */
const state = {
  view: 'contacts',
  modal: null,
  popover: null,
  connections: { hubspot: false, salesforce: false },
  authorizing: null,
  mapping: {
    hubspot: {
      first_name: { source: 'firstname', auto: true },
      phone: { source: 'phone', auto: true },
      timezone: null,
      company: { source: 'company', auto: true },
      job_title: { source: 'jobtitle', auto: true },
      last_demo_date: { source: 'hs_last_demo_date', auto: true },
      lead_score: { source: 'hs_lead_score', auto: true },
      churn_risk: null,
    },
    salesforce: {
      first_name: { source: 'FirstName', auto: true },
      phone: { source: 'Phone', auto: true },
      timezone: { source: 'TimeZoneSidKey', auto: true },
      company: { source: 'Account.Name', auto: true },
      job_title: { source: 'Title', auto: true },
      last_demo_date: null,
      lead_score: { source: 'LeadScore__c', auto: true },
      churn_risk: null,
    }
  },
  writeback: {
    log_calls: true, log_sequences: true, create_props: true, custom_events: false,
  },
  workflowInstalled: { hubspot: false, salesforce: false },
};

const REQUIRED = ['first_name', 'phone', 'timezone'];
const OPTIONAL = ['company', 'job_title', 'last_demo_date', 'lead_score', 'churn_risk'];
const ALL_ATTRS = [...REQUIRED, ...OPTIONAL];

const HS_FIELDS = [
  { name: 'firstname', desc: 'Contact · default' },
  { name: 'lastname', desc: 'Contact · default' },
  { name: 'phone', desc: 'Contact · default' },
  { name: 'mobilephone', desc: 'Contact · default' },
  { name: 'hs_timezone', desc: 'Contact · auto-derived' },
  { name: 'ip_timezone', desc: 'Contact · derived from IP' },
  { name: 'company', desc: 'Contact · default' },
  { name: 'jobtitle', desc: 'Contact · default' },
  { name: 'hs_last_demo_date', desc: 'Contact · custom property' },
  { name: 'hs_lead_score', desc: 'Contact · HubSpot score' },
  { name: 'hs_churn_risk_score', desc: 'Contact · custom property' },
];
const SF_FIELDS = [
  { name: 'FirstName', desc: 'Contact · standard' },
  { name: 'LastName', desc: 'Contact · standard' },
  { name: 'Phone', desc: 'Contact · standard' },
  { name: 'MobilePhone', desc: 'Contact · standard' },
  { name: 'TimeZoneSidKey', desc: 'User · standard' },
  { name: 'Account.Name', desc: 'Account · standard' },
  { name: 'Title', desc: 'Contact · standard' },
  { name: 'LastDemoDate__c', desc: 'Contact · custom field' },
  { name: 'LeadScore__c', desc: 'Contact · custom field' },
  { name: 'ChurnRisk__c', desc: 'Contact · custom field' },
];
const CONTACTS = [
  { name:'Sarah Chen',      phone:'+1 415 555 0102', company:'Acme Inc',          title:'VP Sales',        source:'hubspot',    added:'12m ago' },
  { name:'Marcus Hill',     phone:'+1 415 555 0118', company:'Northwind',         title:'CTO',             source:'salesforce', added:'38m ago' },
  { name:'Priya Shah',      phone:'+1 415 555 0143', company:'Globex',            title:'Head of Ops',     source:'hubspot',    added:'1h ago' },
  { name:'Jordan Kim',      phone:'+1 628 555 0211', company:'Initech',           title:'Director',        source:'hubspot',    added:'2h ago' },
  { name:'Lena Müller',     phone:'+1 628 555 0307', company:'Soylent Corp',      title:'CFO',             source:'api',        added:'3h ago' },
  { name:'Devon Patel',     phone:'+1 628 555 0489', company:'Massive Dynamic',   title:'VP Eng',          source:'salesforce', added:'4h ago' },
  { name:'Aisha Brown',     phone:'+1 628 555 0524', company:'Pied Piper',        title:'Head of Sales',   source:'hubspot',    added:'5h ago' },
  { name:'Tom Reyes',       phone:'+1 628 555 0631', company:'Hooli',             title:'Product Lead',    source:'hubspot',    added:'6h ago' },
  { name:'Maya Johansson',  phone:'+1 628 555 0748', company:'Stark Industries',  title:'COO',             source:'api',        added:'1d ago' },
  { name:'Felix Wei',       phone:'+1 628 555 0852', company:'Wayne Enterprises', title:'VP Marketing',    source:'salesforce', added:'1d ago' },
  { name:'Olivia Park',     phone:'+1 628 555 0967', company:'Cyberdyne',         title:'Sales Engineer',  source:'hubspot',    added:'2d ago' },
  { name:'Raj Mehta',       phone:'+1 628 555 1082', company:'Aperture Science',  title:'GM',              source:'salesforce', added:'2d ago' },
];

const ATTR_DEFS = {
  first_name: { label: 'First name', type: 'string', usedBy: ['Q2 Outreach', 'Inbound Follow-up', 'Re-engagement'] },
  phone: { label: 'Phone', type: 'string', usedBy: ['Q2 Outreach', 'Inbound Follow-up', 'Re-engagement'] },
  timezone: { label: 'Timezone', type: 'string', usedBy: ['Q2 Outreach', 'Inbound Follow-up', 'Re-engagement'] },
  company: { label: 'Company', type: 'string', usedBy: ['Q2 Outreach', 'Inbound Follow-up'] },
  job_title: { label: 'Job title', type: 'string', usedBy: ['Q2 Outreach', 'Inbound Follow-up'] },
  last_demo_date: { label: 'Last demo date', type: 'date', usedBy: ['Q2 Outreach'] },
  lead_score: { label: 'Lead score', type: 'number', usedBy: ['Q2 Outreach', 'Re-engagement'] },
  churn_risk: { label: 'Churn risk', type: 'string', usedBy: ['Re-engagement'] },
};

/* ============================================================
   HELPERS
============================================================ */
const $ = (id) => document.getElementById(id);
function anyConnected(){ return state.connections.hubspot || state.connections.salesforce; }
function connectedCRMs(){
  const out = [];
  if(state.connections.hubspot) out.push('hubspot');
  if(state.connections.salesforce) out.push('salesforce');
  return out;
}
function sourceState(crm, attr){ return state.mapping[crm][attr]; }
function coverageGaps(){
  const crms = connectedCRMs();
  if(crms.length < 2) return [];
  return ALL_ATTRS.filter(a => {
    const sourced = crms.filter(c => sourceState(c, a));
    return sourced.length > 0 && sourced.length < crms.length;
  });
}
function unmappedRequired(crm){ return REQUIRED.filter(a => !sourceState(crm, a)); }
function unmappedAny(){
  const crms = connectedCRMs();
  return ALL_ATTRS.filter(a => crms.length>0 && crms.every(c => !sourceState(c, a)));
}
function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span class="ck">✓</span><span>${msg}</span>`;
  $('toasts').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(8px)'; t.style.transition='all .2s'; setTimeout(()=>t.remove(),220); }, 2400);
}

/* ============================================================
   NAVIGATION
============================================================ */
function goContacts(){ state.view='contacts'; render(); }
function goIntegrations(){ state.view='integrations'; render(); }
function goFields(){ state.view='fields'; render(); }
function goHubSpotPre(){ state.view='hubspot-pre'; render(); }
function goHubSpotConfig(){ state.view='hubspot-config'; render(); }
function goSalesforcePre(){ state.view='salesforce-pre'; render(); }
function goSalesforceConfig(){ state.view='salesforce-config'; render(); }

function openOAuth(crm){ state.modal = 'oauth-' + crm; state.authorizing = crm; render(); }
function cancelOAuth(){ state.modal = null; state.authorizing = null; render(); }
function grantOAuth(){
  const crm = state.authorizing;
  state.connections[crm] = true;
  state.modal = null;
  state.authorizing = null;
  state.view = crm + '-config';
  render();
  toast(`${crm === 'hubspot' ? 'HubSpot' : 'Salesforce'} connected`);
}
function disconnect(crm){
  if(!confirm(`Disconnect ${crm === 'hubspot' ? 'HubSpot' : 'Salesforce'}? Existing enrolled contacts keep flowing, but no new ones will arrive from this source.`)) return;
  state.connections[crm] = false;
  state.workflowInstalled[crm] = false;
  state.view = 'integrations';
  render();
  toast(`${crm === 'hubspot' ? 'HubSpot' : 'Salesforce'} disconnected`);
}

/* ============================================================
   POPOVER (source picker)
   Uses a transparent backdrop overlay to catch outside clicks
   and event delegation on the popover root for item picks.
============================================================ */
function openSourcePicker(event, crm, attr){
  event.stopPropagation();
  const rect = event.currentTarget.getBoundingClientRect();
  const x = Math.min(rect.left, window.innerWidth - 316);
  const y = rect.bottom + 6;
  state.popover = { kind: 'field-picker', x, y, crm, attr, filter: '' };
  renderPopover();
  setTimeout(() => { const s = document.getElementById('po-search-input'); if(s) s.focus(); }, 0);
}
function openAddMenu(event){
  event.stopPropagation();
  const rect = event.currentTarget.getBoundingClientRect();
  const width = 260;
  const x = rect.right - width;
  const y = rect.bottom + 6;
  state.popover = { kind: 'add-menu', x, y, width };
  renderPopover();
}
function closePopover(){
  state.popover = null;
  $('popover-root').innerHTML = '';
}
function pickSource(crm, attr, field){
  closePopover();
  state.mapping[crm][attr] = { source: field, auto: false };
  render();
  toast(`Mapped ${ATTR_DEFS[attr].label} → ${field}`);
}
function clearSource(crm, attr){
  closePopover();
  state.mapping[crm][attr] = null;
  render();
}

function renderPopover(){
  const root = $('popover-root');
  root.innerHTML = '';
  if(!state.popover) return;

  if(state.popover.kind === 'add-menu'){
    const { x, y, width } = state.popover;
    const item = (src, name, bg, letter, sub, disabled=false) => `
      <div class="add-menu-item ${disabled?'disabled':''}" ${disabled?'':`data-source="${src}"`}>
        <div class="ico-sq" style="background:${bg}">${letter}</div>
        <div>
          <div class="ami-name">${name}</div>
          <div class="ami-sub">${sub}</div>
        </div>
      </div>`;
    root.innerHTML = `
      <div class="po-backdrop"></div>
      <div class="popover" style="left:${x}px;top:${y}px;width:${width}px">
        <div class="popover-h">Add contacts from</div>
        ${item('hubspot', 'HubSpot', 'var(--hubspot)', 'H', state.connections.hubspot ? 'Connected' : 'Connect to enroll contacts')}
        ${item('salesforce', 'Salesforce', 'var(--salesforce)', 'S', state.connections.salesforce ? 'Connected' : 'Connect to enroll records')}
        ${item('pipedrive', 'Pipedrive', 'var(--pipedrive)', 'P', 'Coming soon', true)}
      </div>`;
    return;
  }

  // field-picker
  const { x, y, crm, attr, filter } = state.popover;
  const fields = (crm === 'hubspot' ? HS_FIELDS : SF_FIELDS)
    .filter(f => !filter || f.name.toLowerCase().includes(filter.toLowerCase()));
  const current = state.mapping[crm][attr];
  const items = fields.length === 0
    ? '<div class="po-item muted" style="cursor:default">No fields match</div>'
    : fields.map(f => `
        <div class="po-item" data-field="${f.name}">
          <div>
            <div class="mono">${f.name}</div>
            <div class="pmeta">${f.desc}</div>
          </div>
          ${current && current.source === f.name ? '<span style="color:var(--accent);font-weight:800">✓</span>' : ''}
        </div>`).join('');
  const clear = current ? `<div class="po-item" data-action="clear" style="color:var(--err-tx);border-top:1px solid var(--border-soft);margin-top:4px">Clear mapping</div>` : '';
  root.innerHTML = `
    <div class="po-backdrop"></div>
    <div class="popover" style="left:${x}px;top:${y}px">
      <div class="po-search">
        <span style="color:var(--text-3)">⌕</span>
        <input id="po-search-input" placeholder="Search ${crm === 'hubspot' ? 'HubSpot' : 'Salesforce'} fields..." value="${filter}"/>
      </div>
      <div class="popover-h">${crm === 'hubspot' ? 'HubSpot' : 'Salesforce'} fields</div>
      <div id="po-items">${items}</div>
      ${clear}
    </div>`;
}

// Single delegated handler for popover-root clicks
$('popover-root').addEventListener('click', (e) => {
  if(!state.popover) return;
  if(e.target.closest('.po-backdrop')){
    closePopover();
    return;
  }
  // Add-contacts menu
  if(state.popover.kind === 'add-menu'){
    const menuItem = e.target.closest('.add-menu-item[data-source]');
    if(!menuItem) return;
    const src = menuItem.dataset.source;
    closePopover();
    if(src === 'hubspot') state.connections.hubspot ? goHubSpotConfig() : goHubSpotPre();
    else if(src === 'salesforce') state.connections.salesforce ? goSalesforceConfig() : goSalesforcePre();
    return;
  }
  // Field picker
  const item = e.target.closest('.po-item');
  if(!item) return;
  if(item.dataset.action === 'clear'){
    clearSource(state.popover.crm, state.popover.attr);
  } else if(item.dataset.field){
    pickSource(state.popover.crm, state.popover.attr, item.dataset.field);
  }
});

// Search input live-filter (no full re-render — just the items list)
$('popover-root').addEventListener('input', (e) => {
  if(!state.popover || e.target.id !== 'po-search-input') return;
  state.popover.filter = e.target.value;
  const fields = (state.popover.crm === 'hubspot' ? HS_FIELDS : SF_FIELDS)
    .filter(f => f.name.toLowerCase().includes(state.popover.filter.toLowerCase()));
  const current = state.mapping[state.popover.crm][state.popover.attr];
  const items = $('po-items');
  if(!items) return;
  items.innerHTML = fields.length === 0
    ? '<div class="po-item muted" style="cursor:default">No fields match</div>'
    : fields.map(f => `
        <div class="po-item" data-field="${f.name}">
          <div><div class="mono">${f.name}</div><div class="pmeta">${f.desc}</div></div>
          ${current && current.source === f.name ? '<span style="color:var(--accent);font-weight:800">✓</span>' : ''}
        </div>`).join('');
});

/* ============================================================
   TOGGLES
============================================================ */
function toggleWriteback(key){ state.writeback[key] = !state.writeback[key]; render(); }
function installWorkflow(crm){
  state.workflowInstalled[crm] = true;
  render();
  toast(`Workflow ${crm === 'hubspot' ? 'in HubSpot' : 'in Salesforce'} marked as live`);
}

/* ============================================================
   SIDEBAR
============================================================ */
function renderSidebar(){
  if(state.view === 'contacts'){
    return `
      <div class="sb-section">Contacts</div>
      <div class="sb-item on"><span class="ico">●</span>All contacts</div>
      <div class="sb-item"><span class="ico">○</span>Lists</div>
      <div class="sb-item"><span class="ico">○</span>Segments</div>
    `;
  }
  return `
    <div class="sb-section">Account</div>
    <div class="sb-item"><span class="ico">⚙</span>General</div>
    <div class="sb-item"><span class="ico">⎙</span>Members</div>
    <div class="sb-item"><span class="ico">⎘</span>Billing</div>
    <div class="sb-item ${state.view==='fields'?'on':''}" onclick="goFields()"><span class="ico">≡</span>Contact fields</div>
    <div class="sb-section">&nbsp;</div>
    <div class="sb-item ${['integrations','hubspot-pre','hubspot-config','salesforce-pre','salesforce-config'].includes(state.view)?'on':''}" onclick="goIntegrations()"><span class="ico">⌬</span>Integrations</div>
    <div class="sb-item"><span class="ico">{}</span>API keys</div>
  `;
}

/* ============================================================
   TOPBAR
============================================================ */
function renderTopbar(){
  const v = state.view;
  let crumb = '';
  let actions = '';
  if(v === 'contacts'){
    crumb = `<span>Contacts</span>`;
    actions = `<button class="btn btn-outline btn-sm" onclick="goFields()">Edit contact fields</button><button class="btn btn-primary btn-sm" onclick="openAddMenu(event)">+ Add contacts ▾</button>`;
  } else if(v === 'integrations'){
    crumb = `<span class="crumb-light">Settings</span> <span class="crumb-sep">/</span> <span>Integrations</span>`;
  } else if(v === 'fields'){
    crumb = `<span class="crumb-light">Settings</span> <span class="crumb-sep">/</span> <span>Contact fields</span>`;
  } else if(v === 'hubspot-pre'){
    crumb = `<span class="back" onclick="goIntegrations()">←</span><span class="crumb-light" onclick="goIntegrations()">Integrations</span> <span class="crumb-sep">/</span> <span>HubSpot</span>`;
  } else if(v === 'hubspot-config'){
    crumb = `<span class="crumb-light" onclick="goIntegrations()">Integrations</span> <span class="crumb-sep">/</span> <span>HubSpot</span>`;
    actions = `<button class="btn btn-outline btn-sm">Reconnect</button><button class="btn btn-danger-ghost btn-sm" onclick="disconnect('hubspot')">Disconnect</button>`;
  } else if(v === 'salesforce-pre'){
    crumb = `<span class="back" onclick="goIntegrations()">←</span><span class="crumb-light" onclick="goIntegrations()">Integrations</span> <span class="crumb-sep">/</span> <span>Salesforce</span>`;
  } else if(v === 'salesforce-config'){
    crumb = `<span class="crumb-light" onclick="goIntegrations()">Integrations</span> <span class="crumb-sep">/</span> <span>Salesforce</span>`;
    actions = `<button class="btn btn-outline btn-sm">Reconnect</button><button class="btn btn-danger-ghost btn-sm" onclick="disconnect('salesforce')">Disconnect</button>`;
  }
  return `<div class="crumb">${crumb}</div><div class="topbar-actions">${actions}</div>`;
}

/* ============================================================
   VIEWS
============================================================ */
function viewContacts(){
  const sourceTag = (src) => {
    const meta = src === 'hubspot' ? {bg:'var(--hubspot)', letter:'H', name:'HubSpot'}
               : src === 'salesforce' ? {bg:'var(--salesforce)', letter:'S', name:'Salesforce'}
               : {bg:'#52525b', letter:'{', name:'API'};
    return `<span class="src-tag"><span class="src-tag-ico" style="background:${meta.bg}">${meta.letter}</span>${meta.name}</span>`;
  };
  const rows = CONTACTS.map(c => `
    <tr>
      <td><div style="font-weight:600">${c.name}</div></td>
      <td class="mono" style="font-size:12px">${c.phone}</td>
      <td>${c.company}</td>
      <td class="muted">${c.title}</td>
      <td>${sourceTag(c.source)}</td>
      <td class="muted" style="font-size:12px">${c.added}</td>
    </tr>`).join('');
  return `
    <div class="card" style="padding:0;overflow:hidden">
      <table class="maptbl">
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Company</th>
            <th>Title</th>
            <th>Source</th>
            <th>Added</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="card-ft">
        <span class="muted" style="font-size:12px">${CONTACTS.length} contacts</span>
        <div></div>
      </div>
    </div>
  `;
}

function viewFields(){
  const row = (attr) => {
    const d = ATTR_DEFS[attr];
    const isReq = REQUIRED.includes(attr);
    const used = d.usedBy.map(u => `<span class="used-pill">${u}</span>`).join('');
    return `
      <tr>
        <td>
          <div class="attr-name">${d.label}${isReq?'<span class="req-pill">REQ</span>':''}</div>
          <div class="attr-meta">{{${attr}}} · ${d.type}</div>
        </td>
        <td>${used}</td>
      </tr>`;
  };
  const rows = ALL_ATTRS.map(row).join('');
  return `
    <div class="page-title" style="margin-bottom:20px">Contact fields</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="maptbl">
        <thead>
          <tr>
            <th style="width:50%">Field</th>
            <th>Used by</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="card-ft">
        <div></div>
        <button class="btn btn-outline btn-sm">+ Add field</button>
      </div>
    </div>
  `;
}

function viewIntegrations(){
  const integrations = [
    { id:'hubspot', name:'HubSpot', desc:'Enroll contacts via workflow actions.', bg:'var(--hubspot)', letter:'H' },
    { id:'salesforce', name:'Salesforce', desc:'Enroll records via Flow Builder.', bg:'var(--salesforce)', letter:'S' },
    { id:'pipedrive', name:'Pipedrive', desc:'Enroll persons via automations.', bg:'var(--pipedrive)', letter:'P' },
  ];
  const rows = integrations.map(i => {
    const connected = state.connections[i.id];
    let right;
    if(connected){
      const cfgFn = i.id==='hubspot' ? 'goHubSpotConfig()' : 'goSalesforceConfig()';
      right = `<span class="pill pill-ok"><span class="dot"></span>Connected</span><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();${cfgFn}">Configure</button>`;
    } else if(i.id === 'hubspot' || i.id === 'salesforce'){
      const preFn = i.id==='hubspot' ? 'goHubSpotPre()' : 'goSalesforcePre()';
      right = `<span class="pill pill-mute">Not connected</span><button class="btn btn-primary btn-sm" onclick="event.stopPropagation();${preFn}">Connect</button>`;
    } else {
      right = `<span class="pill pill-mute">Not connected</span><button class="btn btn-outline btn-sm" disabled>Coming soon</button>`;
    }
    const click = (i.id === 'hubspot' || i.id === 'salesforce')
      ? `onclick="${connected ? (i.id==='hubspot' ? 'goHubSpotConfig()' : 'goSalesforceConfig()') : (i.id==='hubspot' ? 'goHubSpotPre()' : 'goSalesforcePre()')}"`
      : '';
    return `
      <div class="int-row" ${click}>
        <div class="int-ico" style="background:${i.bg}">${i.letter}</div>
        <div>
          <div class="int-name">${i.name}</div>
          <div class="int-desc">${i.desc}</div>
        </div>
        <div class="int-right">${right}</div>
      </div>`;
  }).join('');

  return `
    <div class="page-title" style="margin-bottom:20px">Integrations</div>
    <div class="card" style="padding:0">${rows}</div>
  `;
}

// Per-CRM mapping table (used inside the integration config pages)
function crmMappingTable(crm){
  const crmName = crm === 'hubspot' ? 'HubSpot' : 'Salesforce';
  const cell = (attr) => {
    const m = state.mapping[crm][attr];
    if(!m){
      const isReq = REQUIRED.includes(attr);
      return `<td><div class="src ${isReq?'unmapped':'warn'}" onclick="openSourcePicker(event,'${crm}','${attr}')"><span>${isReq?'Choose source':'Not mapped'}</span><span class="arrow">▾</span></div></td>`;
    }
    return `<td><div class="src ${m.auto?'auto':''}" onclick="openSourcePicker(event,'${crm}','${attr}')"><span class="mono">${m.source}</span><span class="arrow">▾</span></div></td>`;
  };
  const row = (attr) => {
    const d = ATTR_DEFS[attr];
    const isReq = REQUIRED.includes(attr);
    return `
      <tr>
        <td style="width:48%">
          <div class="attr-name">${d.label}${isReq?'<span class="req-pill">REQ</span>':''}</div>
          <div class="attr-meta">{{${attr}}} · ${d.type}</div>
        </td>
        ${cell(attr)}
      </tr>`;
  };
  const standardRows = ['first_name','phone','timezone','company','job_title'].map(row).join('');
  const customRows = ['last_demo_date','lead_score','churn_risk'].map(row).join('');
  return `
    <table class="maptbl">
      <thead>
        <tr>
          <th>Harmony field</th>
          <th>${crmName} source</th>
        </tr>
      </thead>
      <tbody>
        <tr class="sec-row"><td colspan="2">Standard</td></tr>
        ${standardRows}
        <tr class="sec-row"><td colspan="2">Custom</td></tr>
        ${customRows}
      </tbody>
    </table>`;
}

/* ============================================================
   MODAL (OAuth)
============================================================ */
function renderModal(){
  const root = $('modal-root');
  if(!state.modal){ root.innerHTML = ''; return; }
  const crm = state.modal === 'oauth-hubspot' ? 'hubspot' : 'salesforce';
  const meta = crm === 'hubspot'
    ? { name:'HubSpot', host:'app.hubspot.com', acct:'acme.hubspot.com', bg:'var(--hubspot)', letter:'H',
        scopes: ['View contacts and their properties','Create and update contact properties','Log engagements and timeline events','Install custom workflow actions'] }
    : { name:'Salesforce', host:'login.salesforce.com', acct:'acme.my.salesforce.com', bg:'var(--salesforce)', letter:'S',
        scopes: ['View leads, contacts, and accounts','Read & update standard and custom fields','Create Tasks and Platform Events','Install Flow invocable actions'] };
  root.innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)cancelOAuth()">
      <div class="modal">
        <div class="modal-hd">🔒 ${meta.host}/oauth/authorize</div>
        <div class="modal-bd">
          <div class="oauth-logos">
            <div class="oauth-logo h">H</div>
            <div class="oauth-arrow">⟷</div>
            <div class="oauth-logo" style="background:${meta.bg}">${meta.letter}</div>
          </div>
          <div class="oauth-title">Harmony is requesting access to your ${meta.name} account</div>
          <div class="oauth-sub">Harmony will read records and write activities. You can revoke access any time from ${meta.name} Settings.</div>
          <div class="oauth-acct">
            <div>Connecting: <strong>${meta.acct}</strong></div>
            <div class="muted" style="cursor:pointer">Switch ▾</div>
          </div>
          <div class="oauth-scopes-h">Harmony will be able to:</div>
          ${meta.scopes.map(s => `<div class="oauth-scope"><span class="ck">✓</span><span>${s}</span></div>`).join('')}
        </div>
        <div class="modal-ft">
          <button class="btn btn-ghost" onclick="cancelOAuth()">Cancel</button>
          <button class="btn" style="background:${meta.bg};color:#fff" onclick="grantOAuth()">Connect app</button>
        </div>
      </div>
    </div>`;
}

/* ============================================================
   MAIN RENDER
============================================================ */
function render(){
  $('sidebar').innerHTML = renderSidebar();
  $('topbar').innerHTML = renderTopbar();
  document.querySelectorAll('.rail-item').forEach(r => r.classList.remove('on'));
  if(state.view === 'contacts') $('rail-contacts').classList.add('on');
  else $('rail-settings').classList.add('on');
  let v;
  switch(state.view){
    case 'contacts': v = viewContacts(); break;
    case 'integrations': v = viewIntegrations(); break;
    case 'fields': v = viewFields(); break;
    case 'hubspot-pre': v = viewHubSpotPre(); break;
    case 'hubspot-config': v = viewHubSpotConfig(); break;
    case 'salesforce-pre': v = viewSalesforcePre(); break;
    case 'salesforce-config': v = viewSalesforceConfig(); break;
    default: v = viewContacts();
  }
  $('view').innerHTML = v;
  renderModal();
  renderPopover();
}

render();
